# Vyakhya — self-host stack. Postgres-only (no broker); Redis is opt-in via --profile redis.
# One app: "studio" (backend serves the built frontend). Plus worker + render + data services.
# Images/build contexts are placeholders for early scaffolding.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vyakhya}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-vyakhya}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vyakhya}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-vyakhya}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-change-me}
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  # The single app: FastAPI backend (Agno agents, Scene-JSON) serving the built React Studio frontend.
  studio:
    build: .                         # backend + built frontend in one image
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "${API_PORT:-8000}:8000"

  # Same image as studio, run as a Procrastinate worker (runs the Agno pipeline).
  worker:
    build: .
    command: ["procrastinate", "worker"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    # scale: docker compose up --scale worker=N

  # Node · @hyperframes/producer · compile → lint → render → MP4. Separate runtime (Node + Chrome + FFmpeg).
  render:
    build: ./render
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "${RENDER_PORT:-8080}:8080"
    # scale: docker compose up --scale render=N

  # Opt-in only — Vyakhya does NOT require Redis. Enable with: docker compose --profile redis up
  redis:
    image: redis:7-alpine
    profiles: ["redis"]
    ports:
      - "6379:6379"

volumes:
  pgdata:
  miniodata:
