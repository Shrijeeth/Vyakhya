# Vyakhya — self-host stack. Postgres-only (no broker); Redis is opt-in via --profile redis.
# One app: "studio" (backend serves the built frontend). Plus worker + render + data services.
# Images/build contexts are placeholders for early scaffolding.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vyakhya}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-vyakhya}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vyakhya}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-vyakhya}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-change-me}
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  # Backend API: FastAPI (Agno agents, Scene-JSON). The UI is the `web` service.
  studio:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Install the Agno agent runtime into the image when enabled in .env.
        INSTALL_AGENTS: ${INSTALL_AGENTS:-0}
    env_file: .env
    environment:
      # Allow the browser origin of the web service through CORS.
      CORS_ORIGINS: "http://localhost:${WEB_PORT:-5173}"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "${API_PORT:-8000}:8000"

  # Frontend: TanStack Start SSR, served by Bun. The browser talks to the API
  # cross-origin at http://localhost:${API_PORT} (baked in at build).
  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_KEY: ${VITE_API_KEY:-}
        VITE_API_URL: "http://localhost:${API_PORT:-8000}"
    environment:
      PORT: 3000
    depends_on:
      - studio
    ports:
      - "${WEB_PORT:-5173}:3000"

  # Same image as studio, run as a Procrastinate worker (runs the Agno pipeline).
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_AGENTS: ${INSTALL_AGENTS:-0}
    command: ["procrastinate", "worker"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    # scale: docker compose up --scale worker=N

  # Node · compile → lint → render → MP4. Separate runtime. Build context is the
  # repo root (needs packages/compiler) with the render/ Dockerfile.
  render:
    build:
      context: .
      dockerfile: render/Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "${RENDER_PORT:-8080}:8080"
    # scale: docker compose up --scale render=N

  # Opt-in only — Vyakhya does NOT require Redis. Enable with: docker compose --profile redis up
  redis:
    image: redis:7-alpine
    profiles: ["redis"]
    ports:
      - "6379:6379"

volumes:
  pgdata:
  miniodata:
